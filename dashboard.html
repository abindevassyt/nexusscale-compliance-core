<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusScale Compliance Engine</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(31, 33, 40, 0.6);
            --panel-border: rgba(255, 255, 255, 0.1);
            --accent: #45f3ff;
            --accent-glow: rgba(69, 243, 255, 0.2);
            --text-main: #e0e6ed;
            --text-muted: #8b949e;
            --success: #2ea043;
            --danger: #f85149;
            --warning: #d29922;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(69, 243, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(46, 160, 67, 0.05), transparent 25%);
            display: flex;
            flex-direction: column;
            padding: 2rem;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        h1::before {
            content: '';
            display: block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .circuit-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(46, 160, 67, 0.1);
            color: var(--success);
            border: 1px solid rgba(46, 160, 67, 0.2);
            transition: all 0.3s ease;
        }
        
        .circuit-status.open {
            background: rgba(248, 81, 73, 0.1);
            color: var(--danger);
            border: 1px solid rgba(248, 81, 73, 0.2);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .metric-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
            flex: 1;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--panel-border);
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 6px;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            color: #fff;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--text-main);
            color: var(--bg-color);
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }

        button:active {
            transform: translateY(1px);
        }
        
        button.reset-btn {
            background: var(--danger);
            color: white;
            padding: 6px 12px;
            font-size: 0.8rem;
            margin-top: 0;
            width: auto;
        }

        /* Ledger Styles */
        .ledger {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .ledger::-webkit-scrollbar {
            width: 6px;
        }
        .ledger::-webkit-scrollbar-thumb {
            background: var(--panel-border);
            border-radius: 3px;
        }

        .ledger-item {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ledger-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ledger-agent {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        .ledger-event {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .ledger-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .ledger-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .badge.APPROVED { background: rgba(46, 160, 67, 0.15); color: var(--success); }
        .badge.FLAGGED { background: rgba(210, 153, 34, 0.15); color: var(--warning); }
        .badge.ERROR { background: rgba(248, 81, 73, 0.15); color: var(--danger); }
        .badge.EVAL { background: rgba(69, 243, 255, 0.15); color: var(--accent); }

        /* Logs */
        .logs-panel {
            margin-top: 1.5rem;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            background: rgba(0, 0, 0, 0.5);
        }
        
        .log-line {
            margin-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 2px;
        }
        
        .log-line .time { color: var(--text-muted); margin-right: 8px; }
        .log-line .level { font-weight: bold; margin-right: 8px; }
        .log-line .level.INFO { color: var(--accent); }
        .log-line .level.WARNING { color: var(--warning); }
        .log-line .level.ERROR { color: var(--danger); }

    </style>
</head>
<body>

    <header>
        <h1>NexusScale Compliance Engine</h1>
        <div style="display:flex; gap: 15px; align-items:center;">
            <button id="btnResetCircuit" class="reset-btn" style="display:none;" onclick="resetCircuit()">Reset Circuit</button>
            <div class="circuit-status" id="circuitStatus">
                <span class="indicator">●</span> MCP Circuit: <span id="circuitText">CLOSED</span>
            </div>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="glass-panel metric-card">
            <div class="metric-title">Total Requests</div>
            <div class="metric-value" id="valTotal">0</div>
        </div>
        <div class="glass-panel metric-card">
            <div class="metric-title">Approval Rate</div>
            <div class="metric-value" id="valApprove">0%</div>
        </div>
        <div class="glass-panel metric-card">
            <div class="metric-title">Avg Latency</div>
            <div class="metric-value" id="valLatency">0ms</div>
        </div>
    </div>

    <div class="main-content">
        <!-- Submit Form -->
        <div class="glass-panel">
            <div class="section-title">Manual Submission</div>
            <form id="expenseForm">
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" id="f_employee" value="ENG-001" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="f_dept">
                        <option value="Engineering">Engineering</option>
                        <option value="Sales">Sales</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Executives">Executives</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="f_cat">
                        <option value="travel">Travel</option>
                        <option value="meals">Meals</option>
                        <option value="office_supplies">Office Supplies</option>
                        <option value="software">Software</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Amount (USD)</label>
                    <input type="number" id="f_amount" value="150" step="0.01" required>
                </div>
                <button type="submit" id="btnSubmit">Run Compliance Agent</button>
            </form>
        </div>

        <!-- Audit Ledger -->
        <div class="glass-panel">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div class="section-title" style="border:none; margin:0;">Global Audit Ledger</div>
                <span style="font-size: 0.8rem; color: var(--text-muted);">Polling active</span>
            </div>
            <div class="ledger" id="ledgerList">
                <!-- Items populated via JS -->
                <div style="color:var(--text-muted); text-align:center; padding: 20px;">Waiting for events...</div>
            </div>
        </div>
    </div>

    <!-- Live Logs -->
    <div class="glass-panel logs-panel" id="logsPanel">
        <!-- Logs populated via WS -->
    </div>

    <script>
        // Session Key fetching for submission
        let sessionKey = "";
        
        async function fetchSessionKey() {
            try {
                const res = await fetch('/generate-session-key?employee_id=' + document.getElementById('f_employee').value);
                const data = await res.json();
                sessionKey = data.session_key;
            } catch(e) {
                console.error("Failed to fetch session key", e);
            }
        }
        
        // Initial fetch
        fetchSessionKey();

        // Submit form
        document.getElementById('expenseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.textContent = "Processing...";
            btn.disabled = true;

            await fetchSessionKey(); // ensure fresh key
            
            const payload = {
                employee_id: document.getElementById('f_employee').value,
                employee_email: document.getElementById('f_employee').value.toLowerCase() + "@nexusscale.com",
                department: document.getElementById('f_dept').value,
                category: document.getElementById('f_cat').value,
                amount: parseFloat(document.getElementById('f_amount').value),
                currency: "USD",
                merchant: "Test Merchant GUI",
                receipt_url: "https://example.com/receipt.pdf"
            };

            try {
                const res = await fetch('/submit-expense', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Key': sessionKey
                    },
                    body: JSON.stringify(payload)
                });
                
                await pollUpdates(); // force update immediately
            } catch(err) {
                console.error(err);
            } finally {
                btn.textContent = "Run Compliance Agent";
                btn.disabled = false;
            }
        });

        // Reset Circuit
        async function resetCircuit() {
            try {
                await fetch('/admin/circuit-reset', { method: 'POST' });
                pollUpdates();
            } catch(e) {
                console.error(e);
            }
        }

        // Polling loop
        async function pollUpdates() {
            // Stats & Circuit
            try {
                const statsRes = await fetch('/stats');
                const stats = await statsRes.json();
                document.getElementById('valTotal').innerText = stats.total_requests;
                document.getElementById('valApprove').innerText = stats.approval_rate_pct + '%';
                document.getElementById('valLatency').innerText = stats.avg_processing_ms + 'ms';
            } catch(e) {}
            
            try {
                const cbRes = await fetch('/circuit-state');
                const cb = await cbRes.json();
                const el = document.getElementById('circuitStatus');
                const text = document.getElementById('circuitText');
                const btnReset = document.getElementById('btnResetCircuit');
                
                if(cb.circuit === "CLOSED") {
                    el.classList.remove('open');
                    text.innerText = "CLOSED";
                    btnReset.style.display = 'none';
                } else {
                    el.classList.add('open');
                    text.innerText = "OPEN";
                    btnReset.style.display = 'block';
                }
            } catch(e) {}

            // Audit Ledger
            try {
                const auditRes = await fetch('/audit/recent?limit=30');
                const audit = await auditRes.json();
                const list = document.getElementById('ledgerList');
                
                if (audit.events && audit.events.length > 0) {
                    list.innerHTML = '';
                    audit.events.forEach(ev => {
                        let badgeClass = "EVAL";
                        if (ev.outcome && ev.outcome.includes("APPROVED")) badgeClass = "APPROVED";
                        if (ev.outcome && ev.outcome.includes("FLAGGED")) badgeClass = "FLAGGED";
                        if (ev.event_type.includes("ERROR")) badgeClass = "ERROR";

                        const div = document.createElement('div');
                        div.className = 'ledger-item';
                        div.innerHTML = `
                            <div class="ledger-left">
                                <span class="ledger-agent">${ev.agent_name || ev.trace_id.substring(0,8)}</span>
                                <span class="ledger-event">${ev.event_type || 'EVENT'} — ${ev.outcome || 'Success'}</span>
                            </div>
                            <div class="ledger-right">
                                <span class="badge ${badgeClass}">${badgeClass}</span>
                                <span class="ledger-time">${ev.duration_ms ? ev.duration_ms.toFixed(1) + 'ms | ' : ''}${new Date(ev.timestamp).toLocaleTimeString()}</span>
                            </div>
                        `;
                        list.appendChild(div);
                    });
                }
            } catch(e) {}
        }

        setInterval(pollUpdates, 2000);
        pollUpdates();

        // WebSockets Logs
        let ws;
        function connectWS() {
            ws = new WebSocket(`ws://${window.location.host}/ws/logs`);
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const logsPanel = document.getElementById('logsPanel');
                const div = document.createElement('div');
                div.className = 'log-line';
                div.innerHTML = `
                    <span class="time">[${data.t}]</span>
                    <span class="level ${data.level}">${data.level}</span>
                    <span class="msg">${data.name}: ${data.msg}</span>
                `;
                logsPanel.appendChild(div);
                logsPanel.scrollTop = logsPanel.scrollHeight;
                
                if (logsPanel.children.length > 100) {
                    logsPanel.removeChild(logsPanel.firstChild);
                }
            };
            ws.onclose = () => {
                setTimeout(connectWS, 5000); // Reconnect
            };
        }
        connectWS();
    </script>
</body>
</html>
